<html>
<head>
    <meta charset="UTF-8">
    <title>Задание 3 — Вертикальное меню</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        /* Основное меню */
        .vertical-menu {
            list-style: none;
            padding: 0;
            width: 200px;
            background: #f0f0f0;
            border: 1px solid #999;
        }

        .vertical-menu li {
            border-bottom: 1px solid #ccc;
        }

        .vertical-menu li:last-child {
            border-bottom: none;
        }

        .vertical-menu a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
            background: linear-gradient(to bottom, #f9f9f9, #e0e0e0);
            font-weight: bold;
        }

        .vertical-menu a:hover {
            background: linear-gradient(to bottom, #ccc, #aaa);
            color: white;
        }

        /* Подменю - просто вложенный список */
        .submenu {
            list-style: none;
            padding: 0;
            margin: 0;
            background: #fff;
        }

        .submenu li {
            border-bottom: 1px solid #eee;
            border-top: none;
        }

        .submenu a {
            padding: 8px 15px 8px 25px;  /* Отступ слева для вложенных пунктов */
            background: #fff;
            font-weight: normal;
        }

        .submenu a:hover {
            background: #ff9800;
            color: white;
        }

        /* Скрываем подменю по умолчанию */
        .submenu {
            display: none;
        }

        /* Показываем подменю при наведении на родителя */
        .has-submenu:hover > .submenu {
            display: block;
        }
    </style>
</head>
<body>
    <ul class="vertical-menu">
        <!-- ГЛАВНАЯ с подменю -->
        <li class="has-submenu">
            <a href="#">ГЛАВНАЯ</a>
            <ul class="submenu">
                <li><a href="#">Главная страница</a></li>
                <li><a href="#">Контакты</a></li>
                <li><a href="#">О Нас</a></li>
            </ul>
        </li>
        
        <!-- ОТДЕЛЫ ПРОДАЖ с подменю -->
        <li class="has-submenu">
            <a href="#">ОТДЕЛЫ ПРОДАЖ</a>
            <ul class="submenu">
                <li><a href="#">ПОСТАВЩИКИ</a></li>
                <li><a href="#">НАШИ УСЛУГИ</a></li>
                <li><a href="#">КОНТАКТЫ</a></li>
                <li><a href="#">О НАС</a></li>
            </ul>
        </li>
        
        <!-- ПОСТАВЩИКИ с подменю -->
        <li class="has-submenu">
            <a href="#">ПОСТАВЩИКИ</a>
            <ul class="submenu">
                <li><a href="#">ООО "Дизайн"</a></li>
                <li><a href="#">ООО "Арт"</a></li>
                <li><a href="#">ООО "Фотостиль"</a></li>
            </ul>
        </li>
        
        <!-- Обычные пункты без подменю -->
        <li><a href="#">НАШИ УСЛУГИ</a></li>
        <li><a href="#">КОНТАКТЫ</a></li>
        <li><a href="#">О НАС</a></li>
    </ul>
</body>
</html>
